name: Actualizar Datos de Mercado
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recopilar Datos Maestros
        run: |
          # Llamada 1: S&P 500
          SP500=$(curl -s "https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SPY&apikey=${{ secrets.MARKET_API_KEY }}")
          # Llamada 2: Nasdaq 100
          NASDAQ=$(curl -s "https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=QQQ&apikey=${{ secrets.MARKET_API_KEY }}")

          python3 -c "
          import json, datetime, os

          def get_change(raw_json):
              try:
                  data = json.loads(raw_json)
                  # Alpha Vantage devuelve el cambio porcentual en '10. change percent'
                  return float(data['Global Quote']['10. change percent'].replace('%', ''))
              except:
                  return None

          # Si la API falla, mantenemos unos valores de mercado históricos razonables
          market_data = {
              'last_update': datetime.date.today().isoformat(),
              'indices': {
                  'sp500': get_change('''$SP500''') or 8.5,
                  'nasdaq': get_change('''$NASDAQ''') or 12.0,
                  'ibex35': 4.2 # Dato estático o de otra fuente
              },
              'macro': {
                  'inflacion_eur': 2.5,
                  'euribor': 3.2
              }
          }

          file_path = 'public/data/mercado.json'
          os.makedirs(os.path.dirname(file_path), exist_ok=True)
          with open(file_path, 'w') as f:
              json.dump(market_data, f, indent=2)
          "

      - name: Guardar en Repo
        run: |
          git config --global user.name 'Calculenow Bot'
          git config --global user.email 'bot@calculenow.com'
          git add public/data/mercado.json
          git commit -m "🤖 Master Data Update: $(date -I)" || exit 0
          git push