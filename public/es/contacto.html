<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script type="text/javascript"src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
      </script>

<title>Contacto – Calculenow</title>
<meta name="description" content="¿Tienes alguna duda o sugerencia? Contacta con el equipo de Calculenow. Estaremos encantados de ayudarte con nuestras herramientas.">
<link rel="canonical" href="https://calculenow.com/contacto">

<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)">

<link rel="icon" type="image/x-icon" href="../favicon.ico">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TC6PKX2V"
      height="0" width="0" style="display:none;visibility:hidden">
    </iframe>
  </noscript>
<header></header>
  <main>
    <div class="card contact-card">
      <h1>Contacto</h1>
      <p>Si tienes dudas, sugerencias o comentarios, rellena el siguiente formulario y te responderemos lo antes posible.</p>
    
      <form id="contact-form">
        <label for="nombre">Nombre:</label>
        <input class="field" type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
    
        <label for="email">Correo electrónico:</label>
        <input class="field"type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
    
        <label for="mensaje">Mensaje:</label>
        <textarea class="field" id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." rows="5" required></textarea>
        <div id="form-status" class="form-status"></div>
        <button type="submit" class="btn">Enviar</button>
      </form>
    
      <p>O también puedes escribirnos directamente a: <a href="mailto:contact@calculenow.com">contact@calculenow.com</a></p>
    </div>
  </main>



    <div class="cookie-banner" id="cookie-banner">
    <div id="cookie-main-view">
      <p>
        Utilizamos cookies para mejorar tu experiencia.
        <a href="../es/cookies.html">Ver política de cookies</a>
      </p>
      <div class="cookie-buttons">
        <button class="accept-cookies" id="btn-accept-all">
          Aceptar todas
        </button>
        <button class="reject-cookies" id="btn-reject-all">
          Rechazar todas
        </button>
        <button class="settings-cookies" id="btn-open-settings">
          Configurar
        </button>
      </div>
    </div>

    <div id="cookie-settings-view" style="display: none">
      <p><strong>Personaliza tus preferencias:</strong></p>
      <div class="cookie-option">
        <input type="checkbox" id="check-necessary" checked disabled />
        <label>Necesarias (Obligatorias)</label>
      </div>
      <div class="cookie-option">
        <input type="checkbox" id="check-analytics" />
        <label>Analíticas (Google Analytics)</label>
      </div>
      <div class="cookie-option">
        <input type="checkbox" id="check-marketing" />
        <label>Marketing (Píxeles publicitarios)</label>
      </div>
      <div class="cookie-buttons" style="margin-top: 15px">
        <button class="accept-cookies" id="btn-save-settings">
          Guardar selección
        </button>
        <button class="settings-cookies" id="btn-back">Volver</button>
      </div>
    </div>
  </div>
  <script src="../js/ads.js" async defer></script>

  <script src="../js/layout.js"></script>
    <script src="../js/buscador.js"></script>
  <script src="../js/core.js"></script>
  <script src="../js/contacto.js"></script>
</body>
</html>
