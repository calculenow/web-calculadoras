[dev]
  publish = "public"
  framework = "#static"
  port = 5000

# -----------------------------------------------------------
# REDIRECCIONES: RAÍZ AL IDIOMA PRINCIPAL
# -----------------------------------------------------------
[[redirects]]
  from = "/"
  to = "/es/"
  status = 301

# -----------------------------------------------------------
# REDIRECCIONES 301: URLS LEGACY SIN IDIOMA
# -----------------------------------------------------------
[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/es"
  to = "/es/"
  status = 301

[[redirects]]
  from = "/aviso-legal"
  to = "/es/aviso-legal"
  status = 301

[[redirects]]
  from = "/contacto"
  to = "/es/contacto"
  status = 301

[[redirects]]
  from = "/cookies"
  to = "/es/cookies"
  status = 301

[[redirects]]
  from = "/privacidad"
  to = "/es/privacidad"
  status = 301

