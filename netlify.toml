# -----------------------------------------------------------
# EDGE FUNCTIONS
# -----------------------------------------------------------

# Inyecta el menú de navegación en todas las páginas
[[edge_functions]]
  function = "inyectar-nav"
  path = "/*"

# Inyecta las cards de calculadoras en index y páginas de categoría
[[edge_functions]]
  function = "inyectar-cards"
  path = "/*"

# Detecta el idioma del usuario y redirige a /es/ o /en/
[[edge_functions]]
  function = "languageredirect"
  path = "/"

# -----------------------------------------------------------
# PROCESADO Y OPTIMIZACIÓN
# -----------------------------------------------------------
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# -----------------------------------------------------------
# HEADERS
# -----------------------------------------------------------

# SEO: permitir indexación
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "index, follow"

# Caché para assets estáticos
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"